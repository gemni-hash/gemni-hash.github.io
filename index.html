      async function handleAppClick(event) {
        const button = event.target.closest("[data-action]");
        if (!button) {
          return;
        }

        const { action } = button.dataset;

        if (action === "open-settings") {
          promptForSettings();
          return;
        }

        if (action === "go-home") {
          leaveSettingsIfNeeded();
          state.route = "home";
          render();
          return;
        }

        if (action === "open-item") {
          const item = getItemById(button.dataset.id);
          if (!item) {
            return;
          }
          if (item.type === "series") {
            state.selectedItemId = item.id;
            state.route = "series";
            render();
            return;
          }
          openPlayer(item.id, 0);
          return;
        }

        if (action === "play-episode") {
          openPlayer(button.dataset.id, clampInteger(button.dataset.index, 0, 999, 0));
          return;
        }

        if (action === "leave-player") {
          if (state.returnRoute === "series" && getItemById(state.currentItemId)?.type === "series") {
            state.selectedItemId = state.currentItemId;
            state.route = "series";
          } else {
            state.route = "home";
          }
          render();
          return;
        }

        if (action === "open-series-picker") {
          const current = getItemById(state.currentItemId);
          if (current && current.type === "series") {
            state.selectedItemId = current.id;
            state.route = "series";
            render();
          }
          return;
        }

        if (action === "enter-fullscreen") {
          requestPlayerFullscreen();
          return;
        }

        if (action === "lock-settings") {
          leaveSettingsIfNeeded();
          state.route = "home";
          render();
          return;
        }

        if (action === "change-pin") {
          openPinDialog("change");
          return;
        }

        if (action === "switch-draft-mode") {
          state.addDraft.mode = button.dataset.mode === "series" ? "series" : "video";
          if (state.addDraft.mode === "series" && !state.addDraft.episodes.length) {
            state.addDraft.episodes = [createEpisodeDraft()];
          }
          state.lookup = { loading: false, tone: "normal", message: "" };
          render();
          return;
        }

        if (action === "autofill-video") {
          await autoFillVideoDraft();
          return;
        }

        if (action === "autofill-series") {
          await autoImportSeriesDraft();
          return;
        }

        if (action === "add-episode-row") {
          state.addDraft.episodes.push(createEpisodeDraft());
          render();
          return;
        }

        if (action === "remove-episode-row") {
          const index = clampInteger(button.dataset.index, 0, state.addDraft.episodes.length - 1, 0);
          if (state.addDraft.episodes.length === 1) {
            state.addDraft.episodes[0] = createEpisodeDraft();
          } else {
            state.addDraft.episodes.splice(index, 1);
          }
          render();
          return;
        }

        if (action === "reset-draft") {
          state.addDraft = createDefaultDraft();
          state.lookup = { loading: false, tone: "normal", message: "" };
          render();
          return;
        }

        if (action === "save-item") {
          saveDraftItem();
          return;
        }

        if (action === "move-item") {
          const index = clampInteger(button.dataset.index, 0, state.library.length - 1, 0);
          const direction = button.dataset.direction === "up" ? -1 : 1;
          moveLibraryItem(index, index + direction);
          return;
        }

        if (action === "delete-item") {
          deleteLibraryItem(clampInteger(button.dataset.index, 0, state.library.length - 1, 0));
          return;
        }

        if (action === "quick-limit") {
          state.settings.dailyLimitMinutes = clampInteger(button.dataset.minutes, 0, 720, 0);
          saveSettings();
          updateLiveLabels();
          render();
          showToast("已更新每日观看时长。");
        }
      }

      function handleAppInput(event) {
        const draftField = event.target.dataset.draftField;
        if (draftField) {
          state.addDraft[draftField] = event.target.value;
          if (draftField === "bvid" || draftField === "sourceRef") {
            state.lookup = { loading: false, tone: "normal", message: "" };
          }
          if (draftField === "coverUrl" && state.addDraft.coverDataUrl && event.target.value.trim()) {
            state.addDraft.coverDataUrl = "";
            state.addDraft.coverFileName = "";
          }
          if (draftField === "title" || draftField === "coverUrl") {
            updateDraftPreviewImage();
          }
          return;
        }

        const episodeField = event.target.dataset.episodeField;
        if (episodeField) {
          const index = clampInteger(event.target.dataset.index, 0, state.addDraft.episodes.length - 1, 0);
          state.addDraft.episodes[index][episodeField] = event.target.value;
        }
      }

      function handleAppChange(event) {
        const setting = event.target.dataset.setting;
        if (setting === "dailyLimitMinutes") {
          state.settings.dailyLimitMinutes = clampInteger(event.target.value, 0, 720, 0);
          saveSettings();
          updateLiveLabels();
          render();
          showToast("已保存每日观看时长。");
          return;
        }

        if (setting === "autoFullscreen") {
          state.settings.autoFullscreen = Boolean(event.target.checked);
          saveSettings();
          showToast("已保存全屏设置。");
          return;
        }

        if (event.target.dataset.role === "cover-upload") {
          handleCoverUpload(event.target.files?.[0]);
        }
      }

      async function handleCoverUpload(file) {
        if (!file) {
          return;
        }
        try {
          const dataUrl = await readFileAsDataUrl(file);
          state.addDraft.coverDataUrl = dataUrl;
          state.addDraft.coverFileName = file.name;
          state.addDraft.coverUrl = "";
          render();
        } catch (_error) {
          showToast("封面读取失败，请换一张图片试试。", "error");
        }
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      function setLookupState(update) {
        state.lookup = {
          loading: false,
          tone: "normal",
          message: "",
          ...state.lookup,
          ...update
        };
      }

      function applyFetchedCover(cover) {
        if (!cover || state.addDraft.coverDataUrl || state.addDraft.coverUrl) {
          return;
        }
        state.addDraft.coverUrl = cover;
      }

      function parseImportReference(rawValue) {
        const value = cleanText(rawValue);
        if (!value) {
          return null;
        }

        const bvid = extractBvid(value);
        if (bvid) {
          return {
            kind: "video",
            bvid
          };
        }

        const seasonMatch = value.match(/(?:^|\/|[?&=])ss(\d+)/i);
        if (seasonMatch) {
          return {
            kind: "bangumi-season",
            seasonId: normalizePositiveInt(seasonMatch[1])
          };
        }

        const episodeMatch = value.match(/(?:^|\/|[?&=])ep(\d+)/i);
        if (episodeMatch) {
          return {
            kind: "bangumi-episode",
            episodeId: normalizePositiveInt(episodeMatch[1])
          };
        }

        const seasonIdMatch = value.match(/[?&]season_id=(\d+)/i);
        if (seasonIdMatch) {
          return {
            kind: "bangumi-season",
            seasonId: normalizePositiveInt(seasonIdMatch[1])
          };
        }

        const episodeIdMatch = value.match(/[?&]ep_id=(\d+)/i);
        if (episodeIdMatch) {
          return {
            kind: "bangumi-episode",
            episodeId: normalizePositiveInt(episodeIdMatch[1])
          };
        }

        return null;
      }

      async function autoFillVideoDraft() {
        const reference = parseImportReference(state.addDraft.bvid);
        if (!reference) {
          setLookupState({
            tone: "warn",
            message: "先输入正确的 BV 号，再自动抓取。"
          });
          render();
          return;
        }

        if (reference.kind !== "video") {
          setLookupState({
            tone: "warn",
            message: "这是番剧链接，请切到“合集”模式后用自动导入。"
          });
          render();
          return;
        }

        setLookupState({
          loading: true,
          tone: "normal",
          message: "正在抓取标题和封面..."
        });
        render();

        try {
          const meta = await fetchBilibiliMetadata(reference.bvid);
          state.addDraft.title = state.addDraft.title || meta.title;
          applyFetchedCover(meta.cover);
          state.addDraft.bvid = meta.bvid;
          state.addDraft.page = String(meta.pages[0]?.page || 1);
          setLookupState({
            loading: false,
            tone: "normal",
            message:
              meta.pages.length > 1
                ? `已抓到标题和封面。这个 BV 含 ${meta.pages.length} 个分 P，如需合集可切到“合集”模式自动导入。`
                : "已自动填写标题和封面。"
          });
          render();
          showToast("已自动抓取视频信息。");
        } catch (error) {
          setLookupState({
            loading: false,
            tone: "error",
            message: error instanceof Error ? error.message : "自动抓取失败，请稍后重试。"
          });
          render();
        }
      }

      async function autoImportSeriesDraft() {
        const reference = parseImportReference(
          state.addDraft.sourceRef || state.addDraft.episodes.find((episode) => cleanText(episode.bvid))?.bvid
        );

        if (!reference) {
          setLookupState({
            tone: "warn",
            message: "先输入 BV、ss、ep 或完整番剧链接。"
          });
          render();
          return;
        }

        setLookupState({
          loading: true,
          tone: "normal",
          message: reference.kind === "video" ? "正在导入 BV 合集信息..." : "正在导入番剧信息..."
        });
        render();

        try {
          if (reference.kind === "video") {
            const meta = await fetchBilibiliMetadata(reference.bvid);
            const pages = meta.pages.length ? meta.pages : [{ page: 1, title: meta.title }];
            state.addDraft.mode = "series";
            state.addDraft.sourceRef = meta.bvid;
            state.addDraft.title = state.addDraft.title || meta.title;
            applyFetchedCover(meta.cover);
            state.addDraft.episodes = pages.map((page, index) => ({
              title: cleanText(page.title) || `第${index + 1}集`,
              bvid: meta.bvid,
              page: String(normalizePage(page.page)),
              seasonId: "",
              episodeId: ""
            }));
            setLookupState({
              loading: false,
              tone: "normal",
              message:
                pages.length > 1
                  ? `已自动导入 ${pages.length} 集，并补上标题和封面。`
                  : "这个 BV 只有 1 个分 P，已按单集合集导入。"
            });
          } else {
            const meta = await fetchBangumiMetadata(reference);
            state.addDraft.mode = "series";
            state.addDraft.sourceRef = meta.sourceLabel;
            state.addDraft.title = state.addDraft.title || meta.title;
            applyFetchedCover(meta.cover);
            state.addDraft.episodes = meta.episodes.map((episode, index) => ({
              title: cleanText(episode.title) || `第${index + 1}集`,
              bvid: episode.bvid,
              page: "1",
              seasonId: String(episode.seasonId),
              episodeId: String(episode.episodeId)
            }));
            setLookupState({
              loading: false,
              tone: "normal",
              message: `已导入番剧《${meta.title}》的 ${meta.episodes.length} 集。`
            });
          }

          render();
          showToast("合集信息已自动导入。");
        } catch (error) {
          setLookupState({
            loading: false,
            tone: "error",
            message: error instanceof Error ? error.message : "导入合集失败，请稍后重试。"
          });
          render();
        }
      }

      async function fetchBilibiliMetadata(bvid) {
        try {
          const payload = await fetchBilibiliMetadataByFetch(bvid);
          return normalizeBilibiliMetadata(payload, bvid);
        } catch (_fetchError) {
          const payload = await fetchBilibiliMetadataByJsonp(bvid);
          return normalizeBilibiliMetadata(payload, bvid);
        }
      }

      async function fetchBilibiliMetadataByFetch(bvid) {
        const url = new URL(BILI_VIEW_API);
        url.searchParams.set("bvid", bvid);

        const response = await promiseWithTimeout(
          fetch(url.toString(), {
            method: "GET",
            referrerPolicy: "no-referrer"
          }),
          LOOKUP_TIMEOUT_MS
        );

        if (!response.ok) {
          throw new Error(`Bilibili 返回 ${response.status}，暂时没法自动读取。`);
        }
        return response.json();
      }

      function fetchBilibiliMetadataByJsonp(bvid) {
        return new Promise((resolve, reject) => {
          const callbackName = `__biliKidsJsonp_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
          const script = document.createElement("script");
          const url = new URL(BILI_VIEW_API);
          let timeoutId = 0;

          function cleanup() {
            if (timeoutId) {
              window.clearTimeout(timeoutId);
            }
            delete window[callbackName];
            script.remove();
          }

          window[callbackName] = (payload) => {
            cleanup();
            resolve(payload);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error("Bilibili 没有返回可用信息，请稍后再试。"));
          };

          url.searchParams.set("bvid", bvid);
          url.searchParams.set("jsonp", "jsonp");
          url.searchParams.set("callback", callbackName);
          script.src = url.toString();

          timeoutId = window.setTimeout(() => {
            cleanup();
            reject(new Error("自动抓取超时了，请检查网络后重试。"));
          }, LOOKUP_TIMEOUT_MS);

          document.body.appendChild(script);
        });
      }

      async function fetchBangumiMetadata(reference) {
        const url = new URL(BILI_PGC_SEASON_API);
        if (reference.kind === "bangumi-season") {
          url.searchParams.set("season_id", String(reference.seasonId));
        } else if (reference.kind === "bangumi-episode") {
          url.searchParams.set("ep_id", String(reference.episodeId));
        } else {
          throw new Error("番剧导入参数不正确。");
        }

        let response;
        try {
          response = await promiseWithTimeout(
            fetch(url.toString(), {
              method: "GET",
              referrerPolicy: "no-referrer"
            }),
            LOOKUP_TIMEOUT_MS
          );
        } catch (error) {
          if (error instanceof TypeError) {
            throw new Error("当前环境拦住了番剧自动导入。把页面部署到 HTTPS 静态站后再试，通常就能正常读取。");
          }
          throw error;
        }

        if (!response.ok) {
          throw new Error(`Bilibili 返回 ${response.status}，暂时没法读取番剧信息。`);
        }

        const payload = await response.json();
        return normalizeBangumiMetadata(payload, reference);
      }

      function promiseWithTimeout(promise, timeoutMs) {
        return new Promise((resolve, reject) => {
          const timeoutId = window.setTimeout(() => {
            reject(new Error("自动抓取超时了，请检查网络后重试。"));
          }, timeoutMs);

          promise
            .then((value) => {
              window.clearTimeout(timeoutId);
              resolve(value);
            })
            .catch((error) => {
              window.clearTimeout(timeoutId);
              reject(error);
            });
        });
      }

      function normalizeBilibiliMetadata(payload, fallbackBvid) {
        if (!payload || typeof payload !== "object") {
          throw new Error("Bilibili 返回的数据格式不正确。");
        }
        if (typeof payload.code === "number" && payload.code !== 0) {
          throw new Error(payload.message || "Bilibili 暂时没有返回可用结果。");
        }

        const data = payload.data;
        if (!data || typeof data !== "object") {
          throw new Error("没有找到这个 BV 对应的视频信息。");
        }

        const pages = Array.isArray(data.pages)
          ? data.pages.map((page, index) => ({
              page: normalizePage(page?.page),
              title: cleanText(page?.part) || `第${index + 1}集`
            }))
          : [];

        return {
          bvid: extractBvid(data.bvid) || fallbackBvid,
          title: cleanText(data.title) || fallbackBvid,
          cover: sanitizeCover(data.pic),
          pages
        };
      }

      function normalizeBangumiMetadata(payload, reference) {
        if (!payload || typeof payload !== "object") {
          throw new Error("Bilibili 返回的番剧数据格式不正确。");
        }

        if (typeof payload.code === "number" && payload.code !== 0) {
          throw new Error(payload.message || "Bilibili 暂时没有返回可用的番剧结果。");
        }

        const result = payload.result;
        if (!result || typeof result !== "object") {
          throw new Error("没有找到这个番剧链接对应的内容。");
        }

        const seasonId = normalizePositiveInt(result.season_id);
        const episodes = Array.isArray(result.episodes)
          ? result.episodes
              .map((episode, index) => {
                const episodeId = normalizePositiveInt(episode?.ep_id || episode?.id);
                const bvid = extractBvid(episode?.bvid);
                if (!seasonId || !episodeId) {
                  return null;
                }
                return {
                  title: cleanText(episode?.show_title || episode?.long_title || episode?.share_copy) || `第${index + 1}集`,
                  bvid,
                  seasonId,
                  episodeId
                };
              })
              .filter(Boolean)
          : [];

        if (!episodes.length) {
          throw new Error("这个番剧没有返回可导入的分集。");
        }

        const sourceLabel =
          reference.kind === "bangumi-episode"
            ? `ep${reference.episodeId || episodes[0].episodeId}`
            : `ss${seasonId}`;

        return {
          title: cleanText(result.title || result.season_title) || sourceLabel,
          cover: sanitizeCover(result.cover || result.square_cover),
          seasonId,
          episodes,
          sourceLabel
        };
      }

      function handleModalClick(event) {
        if (event.target.classList.contains("modal-backdrop")) {
          closePinDialog();
          return;
        }
        const button = event.target.closest("[data-modal-action]");
        if (!button) {
          return;
        }
        const { modalAction } = button.dataset;
        if (modalAction === "close") {
          closePinDialog();
          return;
        }
        if (modalAction === "submit") {
          submitPinDialog();
        }
      }

      function handleModalInput(event) {
        const field = event.target.dataset.modalField;
        if (!field) {
          return;
        }
        state.pinDialog.values[field] = event.target.value;
        if (state.pinDialog.error) {
          state.pinDialog.error = "";
        }
      }

      function promptForSettings() {
        if (!state.settings.pin) {
          openPinDialog("create");
          return;
        }
        openPinDialog("unlock");
      }

      function openPinDialog(mode) {
        state.pinDialog = {
          open: true,
          mode,
          error: "",
          values: {
            pin: "",
            current: "",
            next: "",
            confirm: ""
          }
        };
        renderModal();
      }

      function closePinDialog() {
        state.pinDialog.open = false;
        state.pinDialog.error = "";
        renderModal();
      }

      function validatePin(pin) {
        return /^\d{4,8}$/.test(pin);
      }

      function submitPinDialog() {
        const { mode, values } = state.pinDialog;

        if (mode === "unlock") {
          if (values.pin !== state.settings.pin) {
            state.pinDialog.error = "PIN 不正确。";
            renderModal();
            return;
          }
          state.settingsUnlocked = true;
          state.route = "settings";
          closePinDialog();
          render();
          return;
        }

        if (mode === "create") {
          if (!validatePin(values.next)) {
            state.pinDialog.error = "PIN 需要是 4 到 8 位数字。";
            renderModal();
            return;
          }
          if (values.next !== values.confirm) {
            state.pinDialog.error = "两次输入的 PIN 不一致。";
            renderModal();
            return;
          }
          state.settings.pin = values.next;
          state.settingsUnlocked = true;
          state.route = "settings";
          saveSettings();
          closePinDialog();
          render();
          showToast("家长 PIN 已创建。");
          return;
        }

        if (mode === "change") {
          if (values.current !== state.settings.pin) {
            state.pinDialog.error = "当前 PIN 不正确。";
            renderModal();
            return;
          }
          if (!validatePin(values.next)) {
            state.pinDialog.error = "新的 PIN 需要是 4 到 8 位数字。";
            renderModal();
            return;
          }
          if (values.next !== values.confirm) {
            state.pinDialog.error = "两次输入的 PIN 不一致。";
            renderModal();
            return;
          }
          state.settings.pin = values.next;
          saveSettings();
          closePinDialog();
          showToast("PIN 已更新。");
          return;
        }
      }

      function leaveSettingsIfNeeded() {
        state.settingsUnlocked = false;
      }

      function saveDraftItem() {
        const title = cleanText(state.addDraft.title);

        const cover = getDraftCover(true);

        if (state.addDraft.mode === "video") {
          const bvid = extractBvid(state.addDraft.bvid);
          if (!bvid) {
            showToast("请输入正确的 BV 号。", "warn");
            return;
          }

          state.library.push({
            id: createId(),
            type: "video",
            title: title || bvid,
            cover,
            bvid,
            page: normalizePage(state.addDraft.page)
          });

          saveLibrary();
          state.addDraft = createDefaultDraft();
          state.lookup = { loading: false, tone: "normal", message: "" };
          render();
          showToast("单视频已加入白名单。");
          return;
        }

        const episodes = [];
        for (let index = 0; index < state.addDraft.episodes.length; index += 1) {
          const episode = state.addDraft.episodes[index];
          const bvid = extractBvid(episode.bvid);
          const seasonId = normalizePositiveInt(episode.seasonId);
          const episodeId = normalizePositiveInt(episode.episodeId);
          const hasAnyValue = cleanText(episode.title) || cleanText(episode.bvid) || seasonId || episodeId;
          if (!hasAnyValue) {
            continue;
          }
          if (!bvid && !(seasonId && episodeId)) {
            showToast(`第 ${index + 1} 集缺少可播放信息。`, "warn");
            return;
          }
          episodes.push({
            title: cleanText(episode.title) || `第${index + 1}集`,
            bvid,
            page: normalizePage(episode.page),
            seasonId,
            episodeId
          });
        }

        if (!episodes.length) {
          showToast("合集至少要填写一集。", "warn");
          return;
        }

        state.library.push({
          id: createId(),
          type: "series",
          title: title || `合集 ${episodes.length} 集`,
          cover,
          episodes
        });

        saveLibrary();
        state.addDraft = createDefaultDraft();
        state.lookup = { loading: false, tone: "normal", message: "" };
        render();
        showToast("合集已加入白名单。");
      }

      function moveLibraryItem(from, to) {
        if (from === to || to < 0 || to >= state.library.length) {
          return;
        }
        const [item] = state.library.splice(from, 1);
        state.library.splice(to, 0, item);
        saveLibrary();
        render();
      }

      function deleteLibraryItem(index) {
        const item = state.library[index];
        if (!item) {
          return;
        }
        const confirmed = window.confirm(`确定删除《${item.title}》吗？`);
        if (!confirmed) {
          return;
        }
        state.library.splice(index, 1);
        if (state.selectedItemId === item.id || state.currentItemId === item.id) {
          state.selectedItemId = "";
          state.currentItemId = "";
          state.route = state.settingsUnlocked ? "settings" : "home";
        }
        saveLibrary();
        render();
        showToast("已从白名单删除。");
      }

      function getItemById(id) {
        return state.library.find((item) => item.id === id) || null;
      }

      function getEpisodes(item) {
        if (!item) {
          return [];
        }
        if (item.type === "series") {
          return item.episodes;
        }
        return [
          {
            title: item.title,
            bvid: item.bvid,
            page: item.page,
            seasonId: item.seasonId,
            episodeId: item.episodeId
          }
        ];
      }

      function openPlayer(itemId, episodeIndex) {
        if (isLimitReached()) {
          showToast("今天的观看时间已经用完，需要家长调整后继续。", "warn");
          return;
        }

        const item = getItemById(itemId);
        if (!item) {
          return;
        }

        const episodes = getEpisodes(item);
        const boundedIndex = clampInteger(episodeIndex, 0, Math.max(episodes.length - 1, 0), 0);

        state.currentItemId = item.id;
        state.currentEpisodeIndex = boundedIndex;
        state.returnRoute = item.type === "series" ? "series" : "home";
        if (item.type === "series") {
          state.selectedItemId = item.id;
        }
        state.route = "player";
        render();

        if (state.settings.autoFullscreen) {
          window.requestAnimationFrame(() => {
            requestPlayerFullscreen(true);
          });
        }
      }

      function buildPlayerUrl(episode) {
        const url = new URL("https://player.bilibili.com/player.html");
        if (episode.seasonId && episode.episodeId) {
          url.searchParams.set("seasonId", String(episode.seasonId));
          url.searchParams.set("episodeId", String(episode.episodeId));
        } else {
          url.searchParams.set("bvid", episode.bvid);
          if (episode.page > 1) {
            url.searchParams.set("p", String(episode.page));
          }
        }
        return url.toString();
      }

      async function requestPlayerFullscreen(silent = false) {
        const shell = document.getElementById("playerShell");
        if (!shell || typeof shell.requestFullscreen !== "function") {
          if (!silent) {
            showToast("当前浏览器不支持全屏按钮。", "warn");
          }
          return;
        }
        try {
          await shell.requestFullscreen();
        } catch (_error) {
          if (!silent) {
            showToast("浏览器没有允许全屏，可以再点一次试试。", "warn");
          }
        }
      }

      function handleLimitReached() {
        if (document.fullscreenElement && document.exitFullscreen) {
          document.exitFullscreen().catch(() => {});
        }
        state.route = "home";
        render();
        showToast("今天的观看时间已满。", "warn");
      }

      function updateLiveLabels() {
        const remaining = remainingLabel();
        const usage = usageLabel();

        document.querySelectorAll("[data-live='remaining']").forEach((node) => {
          node.textContent = remaining;
        });
        document.querySelectorAll("[data-live='usage']").forEach((node) => {
          node.textContent = usage;
        });
      }

      function getDraftCover(skipFallback = false) {
        const cover = sanitizeCover(state.addDraft.coverDataUrl || state.addDraft.coverUrl);
        if (cover) {
          return cover;
        }
        return skipFallback ? "" : createPlaceholderCover(state.addDraft.title || "新动画片");
      }

      function getCoverForItem(item) {
        return sanitizeCover(item.cover) || createPlaceholderCover(item.title);
      }

      function updateDraftPreviewImage() {
        const preview = app.querySelector(".cover-preview img");
        if (!preview) {
          return;
        }
        const nextCover = getDraftCover();
        preview.src = nextCover;
        preview.dataset.fallback = createPlaceholderCover(state.addDraft.title || "新动画片");
      }

      function hydrateImages() {
        app.querySelectorAll("img[data-fallback]").forEach((image) => {
          image.onerror = () => {
            if (image.dataset.fallback && image.src !== image.dataset.fallback) {
              image.src = image.dataset.fallback;
            }
          };
          if (!image.getAttribute("src")) {
            image.src = image.dataset.fallback;
          }
        });
      }

      function hashString(text) {
        let hash = 0;
        for (const character of Array.from(String(text || ""))) {
          hash = (hash * 31 + character.codePointAt(0)) >>> 0;
        }
        return hash;
      }

      function createPlaceholderCover(title) {
        const palettes = [
          { from: "#ffd66c", to: "#ff8f6b", accent: "#3059e8", accentSoft: "#f6fbff", badge: "#fff3cf" },
          { from: "#7fd7c0", to: "#4d8fff", accent: "#0c3468", accentSoft: "#f2fcff", badge: "#dcfff6" },
          { from: "#ff9ab3", to: "#ffce75", accent: "#73317a", accentSoft: "#fff7fb", badge: "#ffe4ef" },
          { from: "#98d8ff", to: "#7a9cff", accent: "#17356d", accentSoft: "#f0f6ff", badge: "#dff0ff" },
          { from: "#9ce29c", to: "#59c3ae", accent: "#0f5b4d", accentSoft: "#f3fff7", badge: "#dcfff0" }
        ];
        const palette = palettes[hashString(title) % palettes.length];
        const [line1, line2] = splitTitleLines(cleanText(title) || "新动画片");
        const safeLine1 = escapeSvg(line1);
        const safeLine2 = escapeSvg(line2 || "");
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="${escapeSvg(title)}">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="${palette.from}" />
                <stop offset="100%" stop-color="${palette.to}" />
              </linearGradient>
              <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
                <circle cx="16" cy="16" r="4" fill="rgba(255,255,255,0.22)" />
              </pattern>
            </defs>
            <rect width="800" height="600" rx="56" fill="url(#bg)" />
            <rect width="800" height="600" rx="56" fill="url(#dots)" opacity="0.56" />
            <circle cx="640" cy="120" r="96" fill="rgba(255,255,255,0.24)" />
            <circle cx="132" cy="112" r="52" fill="rgba(255,255,255,0.24)" />
            <rect x="60" y="62" width="220" height="42" rx="21" fill="${palette.badge}" />
            <text x="170" y="89" text-anchor="middle" font-family="Baloo 2, Comic Neue, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="${palette.accent}">
              儿童白名单
            </text>
            <text x="60" y="310" font-family="Baloo 2, Comic Neue, PingFang SC, sans-serif" font-size="82" font-weight="700" fill="${palette.accentSoft}">
              ${safeLine1}
            </text>
            ${
              safeLine2
                ? `<text x="60" y="396" font-family="Baloo 2, Comic Neue, PingFang SC, sans-serif" font-size="82" font-weight="700" fill="${palette.accentSoft}">${safeLine2}</text>`
                : ""
            }
            <circle cx="640" cy="426" r="94" fill="rgba(255,255,255,0.26)" />
            <circle cx="640" cy="426" r="76" fill="${palette.accent}" opacity="0.85" />
            <path d="M618 380L692 426L618 472Z" fill="white" />
          </svg>
        `;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function splitTitleLines(title) {
        const chars = Array.from(title);
        if (chars.length <= 6) {
          return [title, ""];
        }
        if (chars.length <= 10) {
          return [chars.slice(0, 5).join(""), chars.slice(5).join("")];
        }
        const middle = Math.ceil(chars.length / 2);
        return [chars.slice(0, middle).join(""), chars.slice(middle, middle + 8).join("")];
      }

      function escapeSvg(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&apos;");
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    })();
  </script>
</body>
</html>
